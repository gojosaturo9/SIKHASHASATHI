<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAGEATHON Smart Attendance</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        background: #e9ecef;
        padding-top: 50px;
        margin: 0;
      }
      .header-title {
        color: #343a40;
        font-size: 2.5em;
        margin-bottom: 10px;
      }
      .container {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 30px;
        margin-top: 40px;
      }
      .card {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        width: 300px;
        transition: transform 0.3s;
      }
      .card:hover {
        transform: translateY(-5px);
      }
      a {
        display: block;
        margin-top: 20px;
        padding: 15px;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 18px;
        transition: opacity 0.3s;
      }
      a:hover {
        opacity: 0.8;
      }
      .admin-btn {
        background: #000000;
      }
      .teacher-btn {
        background: #28a745;
      }
    </style>
  </head>
  <body>
    <h1 class="header-title">🎓 SAGEATHON: Unified Portal</h1>
    <p style="color: #6c757d; font-size: 1.2em">
      Select your workspace to continue
    </p>

    <div class="container">
      <!-- Admin Dashboard (Streamlit par bhejega) -->
      <div class="card">
        <h2 style="margin-top: 0">👨‍💼 Admin Portal</h2>
        <p style="color: #495057">
          Full control, Live Dashboard, Student Registration & Analytics.
        </p>
        <a href="http://localhost:8501" class="admin-btn">Login as Admin</a>
      </div>

      <!-- Teacher PWA (HTML/JS par bhejega) -->
      <div class="card">
        <h2 style="margin-top: 0">📱 Teacher Portal</h2>
        <p style="color: #495057">
          Offline Mode, Classroom Attendance, and Cloud Auto-Sync.
        </p>
        <a href="teacher_pwa/index.html" class="teacher-btn"
          >Open Teacher App</a
        >
      </div>
    </div>
  </body>
</html>
